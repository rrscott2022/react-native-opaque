name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

  test-js:
    name: JS unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

  clippy:
    name: Rust clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: ./rust

  build-rust-ios:
    name: Build Rust (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install cxxbridge
        run: cargo install cxxbridge-cmd

      - name: Build iOS targets
        run: make build-ios

      - name: Upload iOS static libraries
        uses: actions/upload-artifact@v4
        with:
          name: ios-libs
          path: |
            rust/target/aarch64-apple-ios/release/libopaque_rust.a
            rust/target/aarch64-apple-ios-sim/release/libopaque_rust.a
            rust/target/x86_64-apple-ios/release/libopaque_rust.a

  build-rust-android:
    name: Build Rust (Android, Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Android targets via Docker
        run: make docker-build-android

      - name: Upload Android static libraries
        uses: actions/upload-artifact@v4
        with:
          name: android-libs
          path: |
            rust/target/aarch64-linux-android/release/libopaque_rust.a
            rust/target/arm-linux-androideabi/release/libopaque_rust.a
            rust/target/i686-linux-android/release/libopaque_rust.a
            rust/target/x86_64-linux-android/release/libopaque_rust.a
