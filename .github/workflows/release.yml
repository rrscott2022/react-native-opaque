name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  lint-and-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn typecheck

  test-js:
    name: JS unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test

  build-rust-ios:
    name: Build Rust (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install cxxbridge
        run: cargo install cxxbridge-cmd

      - name: Build iOS targets
        run: make build-ios

      - name: Upload iOS static libraries
        uses: actions/upload-artifact@v4
        with:
          name: release-ios-libs
          path: |
            rust/target/aarch64-apple-ios/release/libopaque_rust.a
            rust/target/aarch64-apple-ios-sim/release/libopaque_rust.a
            rust/target/x86_64-apple-ios/release/libopaque_rust.a

  build-rust-android:
    name: Build Rust (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,arm-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b

      - name: Install cxxbridge
        run: cargo install cxxbridge-cmd

      - name: Build Android targets
        run: make build-android
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload Android static libraries
        uses: actions/upload-artifact@v4
        with:
          name: release-android-libs
          path: |
            rust/target/aarch64-linux-android/release/libopaque_rust.a
            rust/target/arm-linux-androideabi/release/libopaque_rust.a
            rust/target/i686-linux-android/release/libopaque_rust.a
            rust/target/x86_64-linux-android/release/libopaque_rust.a

  publish:
    name: Publish to npm & GitHub Release
    needs: [lint-and-typecheck, test-js, build-rust-ios, build-rust-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write      # to create GitHub Release
      id-token: write      # for npm provenance attestation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download iOS static libraries
        uses: actions/download-artifact@v4
        with:
          name: release-ios-libs
          path: rust/target

      - name: Download Android static libraries
        uses: actions/download-artifact@v4
        with:
          name: release-android-libs
          path: rust/target

      - name: Build JS package
        run: yarn prepack

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          find rust/target -name "libopaque_rust.a" | while read f; do
            dest="release-artifacts/$(echo $f | sed 's|rust/target/||' | tr '/' '-')"
            cp "$f" "$dest"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*
