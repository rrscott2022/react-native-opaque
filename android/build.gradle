buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.3"
  }
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

android {
  namespace "com.opaque"
  compileSdk 36
  ndkVersion "27.1.12297006"

  defaultConfig {
    minSdk 24
    targetSdk 36
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()
    externalNativeBuild {
      cmake {
        cppFlags "-O2 -frtti -fexceptions -Wall -fstack-protector-all"
        abiFilters "x86", "x86_64", "armeabi-v7a", "arm64-v8a"
        // Use the shared STL so C++ exceptions and types work across .so boundaries.
        // https://developer.android.com/ndk/guides/cpp-support#selecting_a_c_runtime
        arguments "-DANDROID_STL=c++_shared"
      }
    }
  }

  buildFeatures {
    // Required to consume JSI headers from the react-android prefab package.
    prefab true
    buildConfig true
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
      version "3.31.5"
    }
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_11
    targetCompatibility JavaVersion.VERSION_11
  }
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  // react-android is provided by the React Native Gradle Plugin in the
  // consuming app (RN 0.73+). Using + avoids a hard version pin here.
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-android"
}

if (isNewArchitectureEnabled()) {
  react {
    jsRootDir = file("../src/")
    libraryName = "Opaque"
    codegenJavaPackageName = "com.opaque"
  }
}
